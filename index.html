<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="mainTitle">이미지 아카이브</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --panel: #fff;
      --line: #d5d9e0;
      --line-2: #e7eaf0;
      --text: #1f2937;
      --muted: #667085;
      --accent: #3568d4;
      --soft: #eef4ff;
      --shadow: 0 10px 30px rgba(15, 23, 42, .08)
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f9fafb 0%, var(--bg) 100%)
    }

    a {
      text-decoration: none;
      color: inherit
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 12px 36px
    }

    .board,
    .article {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow)
    }

    .head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line-2);
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #fff
    }

    @media (min-width: 1024px) {
      .head {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
      }
    }

    .titlebox {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .controls-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
    }

    @media (min-width: 1024px) {
      .controls-group {
        justify-content: flex-end;
        flex: 1;
      }
    }

    .toolbar,
    .searchbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center
    }

    .searchbar select {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 8px;
      font-size: 13px;
      outline: none;
      background: #fff;
      cursor: pointer
    }

    .searchbar input {
      width: min(100%, 220px);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      outline: none
    }

    .searchbar input:focus,
    .searchbar select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(53, 104, 212, .12)
    }

    .count {
      font-size: 12px;
      color: var(--muted)
    }

    .btn,
    .page {
      border: 1px solid var(--line);
      background: #fff;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px
    }

    .btn.active,
    .page.current {
      background: #0f172a;
      color: #fff;
      border-color: #0f172a
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed
    }

    thead th {
      background: #f8fafc;
      color: #475467;
      font-size: 13px;
      text-align: left;
      padding: 11px 12px;
      border-bottom: 1px solid var(--line-2);
      font-weight: 700
    }

    tbody td {
      border-bottom: 1px solid var(--line-2);
      padding: 12px;
      font-size: 14px;
      vertical-align: top;
      word-break: keep-all
    }

    tbody tr:hover {
      background: #fafcff
    }

    .num {
      width: 90px;
      color: #475467
    }

    .cat {
      width: 92px
    }

    .title {
      width: auto
    }

    .author {
      width: 120px
    }

    .date {
      width: 110px;
      white-space: nowrap
    }

    .like {
      width: 64px;
      text-align: right
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--soft);
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 700
    }

    .badge.deleted {
      background: #dc2626;
      color: #fff
    }

    .badge.notice {
      background: #ecfdf5;
      color: #047857
    }

    .badge.best {
      background: #fff7d6;
      color: #9a6700
    }

    .title-link {
      font-weight: 700;
      color: #0f172a
    }

    .title-link:hover {
      color: var(--accent)
    }

    .pagination {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 14px;
      background: #fff
    }

    .article {
      display: none;
      margin-top: 16px
    }

    .article.active {
      display: block
    }

    .article-shell {
      padding: 18px
    }

    .article-title {
      margin: 0 0 10px;
      font-size: clamp(22px, 3vw, 28px);
      line-height: 1.35
    }

    .article-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: var(--muted);
      font-size: 13px;
      padding: 12px 14px;
      background: #fafbfc;
      border: 1px solid var(--line-2);
      border-radius: 14px
    }

    .article-meta strong {
      color: #111827
    }

    .article-body img,
    .article-body iframe,
    .article-body embed {
      max-width: 100% !important;
      height: auto !important;
      display: block;
      margin: 12px auto;
      border-radius: 8px;
    }
    
    .img-container {
      position: relative;
      display: block; /* 모바일 대응을 위해 block으로 변경 */
      max-width: 100%;
      margin: 0 auto;
    }

    .video-placeholder:hover {
      background: #e2e8f0 !important;
      border-color: #94a3b8 !important;
      color: #1e293b !important
    }

    .article-body {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line-2);
      line-height: 1.7;
      font-size: 15px;
      color: #374151;
      word-break: break-all;
    }

    .article-images {
      display: grid;
      gap: 10px;
      margin-top: 14px
    }

    .article-images img {
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line-2);
      background: #f8fafc
    }

    .comment-wrap {
      margin-top: 18px;
      border-top: 1px solid var(--line-2);
      padding-top: 14px
    }


    .btn-purge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(220, 38, 38, 0.85);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
    }

    .img-container:hover .btn-purge {
      opacity: 1;
    }

    .comment-wrap h3 {
      margin: 0 0 10px;
      font-size: 17px
    }

    .comment {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 10px;
      padding: 11px 12px;
      border: 1px solid var(--line-2);
      border-radius: 12px;
      background: #fbfcfe;
      margin-bottom: 8px
    }

    .comment .name {
      font-weight: 700;
      color: #111827;
      margin-bottom: 3px
    }

    .comment .meta {
      margin: 0;
      color: var(--muted);
      font-size: 12px
    }

    .comment p {
      margin: 0;
      line-height: 1.7;
      font-size: 14px;
      color: #243041
    }

    .back {
      font-size: 13px;
      color: var(--accent);
      font-weight: 700
    }

    .usericon {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-left: 4px;
      vertical-align: middle;
      background-repeat: no-repeat;
      background-size: contain;
    }

    .usericon.f {
      background-image: url('https://nstatic.dcinside.com/dc/w/images/fix_nik.gif');
    }

    .usericon.s {
      background-image: url('https://nstatic.dcinside.com/dc/w/images/nik.gif');
    }

    .usericon.g {
      background-image: url('https://nstatic.dcinside.com/dc/w/images/fix_managernik.gif');
    }

    .usericon.m {
      background-image: url('https://nstatic.dcinside.com/dc/w/images/fix_sub_managernik.gif');
    }

    .usericon.i {
      background-image: url('https://nstatic.dcinside.com/dc/w/images/fix_nik.gif');
    }

    /* 앱도 고닉으로 표시 */
    .footer {
      margin-top: 14px;
      text-align: center;
      color: #6b7280;
      font-size: 12px
    }

    .hidden {
      display: none !important
    }

    /* 갤러리 뷰 스타일 */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 20px;
      padding-bottom: 40px;
    }
    .gallery-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .gallery-card:hover { transform: translateY(-4px); box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
    .gallery-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      cursor: pointer;
      display: block;
      background: #eee;
    }
    .gallery-card .info {
      padding: 12px;
      font-size: 13px;
      flex-grow: 1;
    }
    .gallery-card .info .ref-count {
      color: var(--accent);
      font-weight: 700;
      margin-left: 4px;
    }
    .gallery-card .actions {
      padding: 10px;
      border-top: 1px solid var(--line-2);
      background: #fcfcfc;
    }
    .gallery-card .btn-purge {
      width: 100%;
      padding: 8px;
      font-size: 12px;
      position: static;
      opacity: 1;
      display: block;
    }

    .matched-comment {
      padding: 4px 0 8px 24px;
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: flex-start;
      gap: 8px
    }

    .matched-comment .icon {
      color: var(--accent);
      font-weight: 700
    }

    .matched-comment .c-body {
      color: #4b5563
    }

    .matched-comment b {
      color: var(--text);
      font-weight: 700;
      margin-right: 6px
    }

    mark {
      background: #fef08a;
      color: #854d0e;
      padding: 0 2px;
      border-radius: 2px
    }

    @media (max-width: 768px) {
      .wrap { padding: 10px 0 20px; }
      .board, .article { border-radius: 0; border-left: none; border-right: none; }
      .head { padding: 12px; }
      .titlebox strong { font-size: 16px; }
      
      /* 모바일에서 불필요한 열 숨기기 */
      .num, .date, .like { display: none; }
      .cat { width: 42px; font-size: 10px; }
      
      /* 테이블 행 디자인 조정 (제목 공간 극대화) */
      tbody td { padding: 14px 6px; }
      .title-link { font-size: 15px; display: inline-block; line-height: 1.3; vertical-align: middle; max-width: 80%; }
      .author { width: 80px; font-size: 11px; color: var(--muted); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 5px; }
      
      .pagination { gap: 4px; padding: 10px; }
      .page { padding: 6px 10px; font-size: 12px; }
      
      .article-shell { padding: 15px; }
      .article-title { font-size: 20px; margin-bottom: 12px; }
      .article-meta { padding: 12px; font-size: 12px; gap: 8px 12px; background: rgba(255,255,255,0.03); }
      
      .comment { grid-template-columns: 1fr; gap: 4px; padding: 12px; }
      .comment .name { font-size: 13px; font-weight: 600; }
      .comment p { font-size: 13px; line-height: 1.5; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <section class="board" id="boardView">
      <div class="head">
        <div class="titlebox">
          <a href="/" style="text-decoration:none;color:inherit">
            <strong id="headerTitle" style="font-size: 20px; letter-spacing: -0.5px;">갤러리 저장소</strong>
          </a>
          <select id="gallSelector" class="btn" style="background:var(--soft); border-color:var(--accent); font-weight:700; padding: 8px 12px;">
            <!-- 갤러리 목록이 동적으로 채워짐 -->
          </select>
        </div>
        <div class="controls-group">
          <div class="searchbar">
            <span class="count" id="resultCount">...</span>
            <select id="searchMode" class="btn" style="padding:9px 8px; border-radius:10px;">
              <option value="title_body">제목+내용</option>
              <option value="title">제목</option>
              <option value="body">내용</option>
              <option value="author">글쓴이</option>
              <option value="uid">아이디</option>
              <option value="comment">댓글</option>
              <option value="hash">이미지해시</option>
            </select>
            <input id="searchInput" type="search" placeholder="검색어 입력..." />
          </div>
          <div class="toolbar">
            <button id="btnGallery" class="btn" style="background:var(--soft); border-color:var(--accent); color:var(--accent); font-weight:700; white-space:nowrap;">🖼️ 이미지 관리</button>
            <div style="display:flex; gap:6px;">
              <button class="btn active" data-mode="all">전체</button>
              <button class="btn" data-mode="notice">공지</button>
              <button class="btn" data-mode="recommand">개념글</button>
              <button class="btn" data-mode="deleted">삭제글</button>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 갤러리 뷰 모드 추가 -->
      <div id="galleryView" class="hidden" style="padding:20px;">
        <div id="media-gallery-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
          <h2 style="margin:0; font-size:20px;">🖼️ 전체 이미지 관리</h2>
          <div style="display:flex; gap:10px; align-items:center;">
            <select id="gallerySort" onchange="resetAndLoadGallery()" style="padding:8px; border-radius:8px; border:1px solid var(--border); background:var(--card-bg); color:var(--text);">
              <option value="latest">최신순</option>
              <option value="popular">인기순</option>
            </select>
            <input type="number" id="galleryPostNo" placeholder="글 번호" style="padding:8px; border-radius:8px; border:1px solid var(--border); width:100px;">
            <input type="text" id="galleryHash" placeholder="해시값 검색" style="padding:8px; border-radius:8px; border:1px solid var(--border); width:150px;">
            <button onclick="resetAndLoadGallery()" class="btn">검색</button>
          </div>
          <button onclick="showList()" class="btn">목록으로 돌아가기</button>
        </div>
        <div id="galleryGrid" class="gallery-grid">
          <!-- 이미지 카드들이 여기에 동적으로 삽입됨 -->
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th class="num">번호</th>
            <th class="cat">분류</th>
            <th class="title">제목</th>
            <th class="author">글쓴이</th>
            <th class="date">날짜</th>
            <th class="like">추천</th>
          </tr>
        </thead>
        <tbody id="postList"></tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </section>

    <section class="article" id="articleView">
      <div class="head">
        <div class="titlebox">
          <strong>글 상세</strong>
          <button id="btnRefresh" class="btn" style="margin-left:10px; padding:4px 8px; font-size:11px; vertical-align:middle;">수동 갱신</button>
          <button id="btnWatch" class="btn" style="margin-left:5px; padding:4px 8px; font-size:11px; vertical-align:middle;">⭐ 감시 추가</button>
          <a id="btnOriginal" class="btn" target="_blank" rel="noreferrer" style="margin-left:5px; padding:4px 8px; font-size:11px; vertical-align:middle; display:inline-flex; align-items:center; gap:4px; text-decoration:none; color:inherit;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            원본 글 보기
          </a>
        </div>
        <a class="back" href="#" id="backToList">목록으로 돌아가기</a>
      </div>
      <div class="article-shell">
        <h2 class="article-title" id="postTitle">글을 선택하세요</h2>
        <div class="article-meta">
          <div><strong>분류</strong> <span id="postCategory">-</span></div>
          <div><strong>글쓴이</strong> <span id="postAuthor">-</span></div>
          <div><strong>추천</strong> <span id="postLikes">-</span></div>
          <div><strong>댓글</strong> <span id="postComments">-</span></div>
          <div><strong>조회</strong> <span id="postViews">-</span></div>
          <div><strong>작성시각</strong> <span id="articleDate">-</span></div>
        </div>
        <div class="article-body" id="postBody">본문을 불러오는 중입니다.</div>
        <div class="article-images" id="postImages"></div>
        <div class="comment-wrap">
          <h3>댓글</h3>
          <div id="commentList"></div>
        </div>
      </div>
    </section>

    <div class="footer">
      <div id="footerText">백업 저장소</div>
      <div id="storageStats" style="margin-top:8px; font-size:12px; color:var(--text-3); opacity:0.8;">
        저장소 현황 불러오는 중...
      </div>
    </div>
  </div>
  <script>
    // URL 경로에서 갤러리 ID 추출 (/list/vr -> vr)
    let gallId = location.pathname.split('/')[2] || "vr";
    let gallName = "";

    const qs = new URLSearchParams(location.search);
    const pageParam = Number(qs.get('page')) || 1;
    const modeParam = qs.get('mode') || 'all';
    const queryParam = qs.get('q') || '';
    
    async function initApp() {
      try {
        // 해당 갤러리 설정 및 전체 갤러리 목록 가져오기
        const res = await fetch(`/api/config?gall=${gallId}`);
        const config = await res.json();
        gallId = config.gallId;
        gallName = config.gallName;
        const gallColor = config.gallColor || "#3568d4";
        
        // 테마 색상 적용
        document.documentElement.style.setProperty('--accent', gallColor);
        document.documentElement.style.setProperty('--soft', gallColor + '15'); // 15% 투명도
        
        document.title = `${gallName} 이미지 아카이브`;
        document.getElementById('headerTitle').textContent = `${gallName} 아카이브`;
        document.getElementById('footerText').textContent = `${gallName} 스타일 백업 저장소`;
        document.getElementById('backToList').href = `/list/${gallId}`;

        // 갤러리 셀렉터 구성
        const selector = document.getElementById('gallSelector');
        if (config.allGalleries) {
          selector.innerHTML = config.allGalleries.map(g => 
            `<option value="${g.id}" ${g.id === gallId ? 'selected' : ''}>${g.name}</option>`
          ).join('');
        }
        selector.onchange = (e) => {
          location.href = `/list/${e.target.value}`;
        };
        
        const noFromPath = location.pathname.split('/').pop();
        if (location.pathname.includes('/view/')) {
          showArticle();
          openPost(noFromPath, pageParam);
        } else {
          showList();
          loadPage(pageParam);
        }
      } catch(e) {
        console.error("Config load failed", e);
        loadPage(pageParam);
      }
    }
    initApp();

    const boardView = document.getElementById('boardView');
    const articleView = document.getElementById('articleView');
    const input = document.getElementById('searchInput');
    const searchModeSelect = document.getElementById('searchMode');
    const resultCount = document.getElementById('resultCount');
    const postList = document.getElementById('postList');
    const pagination = document.getElementById('pagination');
    const modeButtons = Array.from(document.querySelectorAll('[data-mode]'));
    const postTitle = document.getElementById('postTitle');
    const postCategory = document.getElementById('postCategory');
    const postAuthor = document.getElementById('postAuthor');
    const postLikes = document.getElementById('postLikes');
    const postComments = document.getElementById('postComments');
    const postViews = document.getElementById('postViews');
    const articleDate = document.getElementById('articleDate');
    const postBody = document.getElementById('postBody');
    const postImages = document.getElementById('postImages');
    const commentList = document.getElementById('commentList');
    const rows = [];
    let currentPage = pageParam;
    let currentMode = modeParam;
    let currentQuery = queryParam;
    let firstPage = 1;
    let lastPage = 1;

    const galleryView = document.getElementById('galleryView');
    const galleryGrid = document.getElementById('galleryGrid');
    const btnGallery = document.getElementById('btnGallery');

    let galleryOffset = 0;
    let galleryLoading = false;
    let galleryEnd = false;

    function showList() { 
      boardView.classList.remove('hidden'); 
      articleView.classList.remove('active'); 
      galleryView.classList.add('hidden');
      postList.closest('table').style.display = 'table';
      pagination.style.display = 'flex';
    }
    function showArticle() { 
      boardView.classList.add('hidden'); 
      articleView.classList.add('active'); 
      galleryView.classList.add('hidden');
    }
    function showGallery() {
      boardView.classList.remove('hidden');
      articleView.classList.remove('active'); 
      galleryView.classList.remove('hidden');
      
      postList.closest('table').style.display = 'none';
      pagination.style.display = 'none';
      
      resetAndLoadGallery();
    }
    btnGallery.onclick = showGallery;

    async function loadGallery(isAppend = false) {
      if (galleryLoading) return;
      if (!isAppend) {
        galleryOffset = 0;
        galleryEnd = false;
        galleryGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px;">불러오는 중...</div>';
      }
      
      galleryLoading = true;
      const sort = document.getElementById('gallerySort').value;
      const postNo = document.getElementById('galleryPostNo').value;
      const hash = document.getElementById('galleryHash').value;
      
      try {
        const res = await fetch(`/api/media-all?gall=${gallId}&sort=${sort}&postNo=${postNo}&hash=${hash}&offset=${galleryOffset}`);
        const data = await res.json();
        
        if (!isAppend) galleryGrid.innerHTML = '';
        
        if (!data || data.length === 0) {
          galleryEnd = true;
          if (!isAppend) galleryGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px;">이미지가 없습니다.</div>';
          return;
        }

        const html = data.map(item => `
          <div class="gallery-card" id="card-${item.hash}">
            <a href="${item.path}" target="_blank"><img src="${item.path}" loading="lazy"></a>
            <div class="info">
              <div style="cursor:pointer; text-decoration:underline; font-weight:700; color:var(--accent);" onclick="showMediaPosts('${item.hash}', this)">
                참조된 글: ${item.refCount}개 (목록 보기)
              </div>
              <div style="opacity:0.5; font-size:10px; word-break:break-all; margin-top:5px;">${(item.hash || 'no-hash').substring(0, 16)}...</div>
            </div>
            <div class="actions">
              <button class="btn-purge" onclick="purgeImageFromGallery('${item.path}', '${item.hash}')">영구 삭제/차단</button>
            </div>
          </div>
        `).join('');
        
        galleryGrid.insertAdjacentHTML('beforeend', html);
        galleryOffset += data.length;
      } catch (e) {
        console.error(e);
        if (!isAppend) galleryGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; color:red;">불러오기 실패: ' + e.message + '</div>';
      } finally {
        galleryLoading = false;
      }
    }

    function resetAndLoadGallery() {
      loadGallery(false);
    }

    window.addEventListener('scroll', () => {
      if (galleryView.classList.contains('hidden')) return;
      if (galleryLoading || galleryEnd) return;
      
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
        loadGallery(true);
      }
    });

    async function purgeImageFromGallery(path, hash) {
      if (!confirm('이 이미지가 포함된 모든 글에서 이미지를 삭제하고 차단하시겠습니까?')) return;
      const res = await fetch(`/api/purge-image?gall=${gallId}&path=${encodeURIComponent(path)}`);
      const data = await res.json();
      if (data.success) {
        const card = document.getElementById(`card-${hash}`);
        if (card) {
          card.style.opacity = '0.3';
          card.style.pointerEvents = 'none';
          card.querySelector('.btn-purge').textContent = '완료';
        }
      } else {
        alert('삭제 실패: ' + data.error);
      }
    }
    async function showMediaPosts(hash, el) {
      // 갤러리 검색 모드 실행
      input.value = hash;
      searchModeSelect.value = "hash";
      currentQuery = hash;
      currentPage = 1;
      
      showList();
      loadPage(1);
    }

    function syncCount(v) { resultCount.textContent = `${v}개 표시 중`; }
    function renderComments(comments) {
      const filtered = comments.filter(c => (c.name || '').trim() !== '댓글돌이');
      commentList.innerHTML = filtered.length
        ? filtered.map((c) => `
          <div class="comment" style="margin-left:${Math.min(24, (c.depth || 0) * 14)}px">
            <div>
              <div class="name" style="margin-bottom: 2px;">
                ${c.name || '익명'} ${userIcon(c.icon)}
                ${c.uid ? `<div style="opacity:0.5; font-size:10px; font-weight:400; margin-top:1px;">${c.uid}</div>` : ''}
              </div>
              <p class="meta">${c.meta || ''}</p>
            </div>
            <p>${c.body || ''}</p>
          </div>`).join('')
        : '<div class="comment"><div><div class="name">댓글 없음</div><p class="meta">-</p></div><p>수집된 댓글이 없습니다.</p></div>';
    }
    function renderImages(images) {
      if (!images || !images.length) {
        postImages.innerHTML = '';
        return;
      }
      postImages.innerHTML = images.map((src) => {
        const cacheBuster = `?t=${Date.now()}`;
        const bustedSrc = src + cacheBuster;
        return `
        <div class="img-container">
          <button class="btn-purge" onclick="purgeImage('${src}')">영구 삭제/차단</button>
          <a href="${bustedSrc}" target="_blank" rel="noreferrer"><img src="${bustedSrc}" alt="" loading="lazy" decoding="async"></a>
        </div>`;
      }).join('');
    }
    function setPagination(page, pages) {
      currentPage = page;
      firstPage = pages.firstPage || 1;
      lastPage = pages.lastPage || page;
      const nums = [];
      const start = Math.max(firstPage, page - 2);
      for (let i = 0; i < 5; i++) nums.push(start + i);
      pagination.innerHTML = `
        <button class="page" data-page="${firstPage}">맨처음</button>
        <button class="page" data-page="${Math.max(firstPage, page - 1)}">이전</button>
        ${nums.map(n => `<button class="page ${n === page ? 'current' : ''}" data-page="${n}">${n}</button>`).join('')}
        <button class="page" data-page="${Math.min(lastPage, page + 1)}">다음</button>
        <button class="page" data-page="${lastPage}">맨끝</button>
      `;
    }
    function applyFilter() {
      // 이제 서버가 모든 검색 필터링을 수행하므로 브라우저에서는 개수 동기화만 진행
      syncCount(rows.length);
    }
    function modeBadge(item) {
      const isDeleted = item.category === '삭제글' || item.deleted;
      if (isDeleted) return '<span class="badge deleted">삭제글</span>';
      if (item.type === 'notice') return '<span class="badge notice">공지</span>';
      if (item.type === 'best') return '<span class="badge best">개념</span>';
      return `<span class="badge">${item.category || '일반'}</span>`;
    }
    function highlight(text, q) {
      if (!q) return text;
      const re = new RegExp(`(${q})`, 'gi');
      return text.replace(re, '<mark>$1</mark>');
    }
    function userIcon(type) {
      if (!type) return '';
      return `<span class="usericon ${type}"></span>`;
    }
    function formatDate(dateStr) {
      if (!dateStr) return '';
      // 풀 날짜 형태: "2026.05.11 21:18:58" 또는 "2026-05-11 21:18:58"
      const parts = dateStr.split(' ');
      if (parts.length < 2) return dateStr; // 이미 짧은 형태면 그대로 반환

      const datePart = parts[0].replace(/-/g, '.'); // "2026.05.11" 형태로 통일
      const timePart = parts[1]; // "21:18:58"

      const now = new Date();
      const today = now.getFullYear() + '.' + String(now.getMonth() + 1).padStart(2, '0') + '.' + String(now.getDate()).padStart(2, '0');

      if (datePart === today) {
        return timePart.substring(0, 5); // 오늘이면 "21:18"
      }
      return datePart.split('.').slice(1).join('.'); // 과거면 "05.11"
    }
    function renderList(items) {
      const q = input.value.trim();
      rows.length = 0; // 기존 데이터 초기화
      rows.push(...items); // 새 데이터 삽입
      
      postList.innerHTML = items.map((item) => {
        let html = `
        <tr data-no="${item.no}" data-type="${item.type || 'normal'}" data-deleted="${item.deleted ? '1' : '0'}">
          <td class="num">${item.num || item.no}</td>
          <td class="cat">${modeBadge(item)}</td>
          <td class="title">
            <a class="title-link" href="/view/${gallId}/${item.no}?page=${currentPage}&mode=${currentMode}">
              ${highlight(item.title || '(제목 없음)', q)}
            </a>
            ${(item.commentCount && item.commentCount !== '0') ? `<span style="color:var(--accent);font-size:12px;margin-left:4px;font-weight:700">[${item.commentCount}]</span>` : ''}
          </td>
          <td class="author">
            ${highlight(item.author || '', q)}
            ${item.uid ? `<br><small style="opacity:0.5; font-size:10px;">${item.uid}</small>` : ''}
            ${userIcon(item.authorIcon)}
          </td>
          <td class="date">${formatDate(item.date)}</td>
          <td class="like">추천 ${item.likes || 0}</td>
        </tr>`;

        if (item.matchedComments && item.matchedComments.length) {
          item.matchedComments.forEach(c => {
            html += `
            <tr class="comment-row">
              <td colspan="2"></td>
              <td colspan="4">
                <div class="matched-comment">
                  <span class="icon">L</span>
                  <span class="c-body"><b>${highlight(c.name, q)}</b> ${highlight(c.body, q)}</span>
                </div>
              </td>
            </tr>`;
          });
          if (item.totalMatched > 10) {
            html += `
             <tr class="comment-row">
               <td colspan="2"></td>
               <td colspan="4">
                 <div class="matched-comment" style="color:var(--accent);font-weight:700;padding-top:0">
                   <span class="icon">L</span>
                   <span class="c-body">... 외 ${item.totalMatched - 10}개의 댓글이 더 매칭되었습니다. (상세 페이지에서 확인)</span>
                 </div>
               </td>
             </tr>`;
          }
        }
        return html;
      }).join('');
      // [수정] 진짜 게시글 줄(data-no가 있는 줄)만 골라서 이벤트를 겁니다.
      rows.splice(0, rows.length, ...Array.from(document.querySelectorAll('#postList tr[data-no]')));
      rows.forEach((row) => {
        const link = row.querySelector('a');
        if (link) {
          link.addEventListener('click', async (e) => { e.preventDefault(); await openPost(row.dataset.no, currentPage); });
        }
      });
      applyFilter();
    }
    async function loadPage(page, skipPush = false) {
      resultCount.textContent = '불러오는 중...';
      const sm = searchModeSelect.value;
      const res = await fetch(`/api/list?gall=${gallId}&page=${encodeURIComponent(page)}&mode=${encodeURIComponent(currentMode)}&q=${encodeURIComponent(currentQuery)}&sm=${sm}`);
      const data = await res.json();
      setPagination(page, data);
      renderList(data.items || []);
      syncCount(data.items ? data.items.length : 0);
      if (!skipPush) {
        history.pushState(null, '', `/list/${gallId}?page=${page}&mode=${currentMode}&q=${encodeURIComponent(currentQuery)}&sm=${sm}`);
      }
    }
    async function openPost(no, page, skipPush = false) {
      try {
      showArticle();
      postTitle.textContent = '불러오는 중...';
      postBody.textContent = '본문을 불러오는 중입니다.';
      const res = await fetch(`/api/post?gall=${gallId}&no=${encodeURIComponent(no)}&page=${encodeURIComponent(page || currentPage)}&mode=${encodeURIComponent(currentMode)}&q=${encodeURIComponent(currentQuery)}`);
      const data = await res.json();

      // 삭제 여부와 상관없이 저장된 데이터가 있다면 출력
      postTitle.innerHTML = data.title || '상세 페이지';
      postCategory.textContent = data.category || '-';
      postAuthor.innerHTML = `
        ${data.author || '-'}
        ${data.uid ? `<small style="opacity:0.6; margin-left:5px;">(${data.uid})</small>` : ''}
        ${userIcon(data.authorIcon)}
      `;
      postLikes.textContent = data.likes || '-';
      postComments.textContent = data.commentCount || (data.comments ? data.comments.length : '-');
      postViews.textContent = data.views || '-';
      articleDate.textContent = data.date || '-';

      // 원본 링크 설정
      const btnOriginal = document.getElementById('btnOriginal');
      if (btnOriginal && data.href) {
        btnOriginal.href = data.href;
        btnOriginal.style.display = 'inline-flex';
      } else if (btnOriginal) {
        btnOriginal.style.display = 'none';
      }

      // 본문 출력 (보존된 HTML이 있으면 우선 사용)
      if (data.contentHtml && data.contentHtml.trim()) {
        postBody.innerHTML = data.contentHtml;
        postImages.style.display = 'none'; // 레이아웃 보존 시 하단 이미지 목록 숨김
      } else if (data.rawText) {
        postBody.textContent = data.rawText;
        postImages.style.display = 'block';
        renderImages(data.localImages || []);
      } else {
        postBody.textContent = '본문 데이터가 없습니다.';
        postImages.style.display = 'block';
      }

      // 감시 버튼 초기화 및 이벤트
      const btnWatch = document.getElementById('btnWatch');
      if (btnWatch) {
        // 초기 상태 확인
        const statusRes = await fetch(`/api/watch-status?gall=${gallId}&no=${no}`);
        const statusJson = await statusRes.json();
        updateWatchBtn(statusJson.isWatching);

        btnWatch.onclick = async () => {
          const res = await fetch(`/api/watch-toggle?gall=${gallId}&no=${no}`);
          const resJson = await res.json();
          if (resJson.success) {
            updateWatchBtn(resJson.isWatching);
          }
        };
      }

      function updateWatchBtn(isWatching) {
        if (isWatching) {
          btnWatch.innerHTML = '<span style="color:#facc15">⭐</span> 감시 해제';
          btnWatch.style.borderColor = '#facc15';
        } else {
          btnWatch.innerHTML = '⭐ 감시 추가';
          btnWatch.style.borderColor = '';
        }
      }

      // 수동 갱신 버튼 이벤트 복구
      const refreshBtn = document.getElementById('btnRefresh');
      if (refreshBtn) {
        refreshBtn.onclick = async () => {
          if (!confirm('원본 사이트에서 데이터를 다시 긁어올까요?')) return;
          refreshBtn.textContent = '갱신 중...';
          const r = await fetch(`/api/refresh-post?gall=${gallId}&no=${no}`);
          const resJson = await r.json();
          if (resJson.success) {
            alert('갱신 완료!');
            await openPost(no, page);
          } else {
            alert('갱신 실패: ' + (resJson.error || '알 수 없는 오류'));
          }
          refreshBtn.textContent = '수동 갱신';
        };
      }
      
      // 본문 내 이미지들에도 삭제 버튼 주입 (contentHtml 처리)
      if (data.contentHtml) {
        setTimeout(() => {
          const imgs = postBody.querySelectorAll('img');
          const cacheBuster = `?t=${Date.now()}`;
          imgs.forEach(img => {
            if (img.src.includes('/media/')) {
              // 캐시 버스터 추가 (수동 갱신 시 이미지 교체 원활하게)
              if (!img.src.includes('?t=')) {
                img.src += cacheBuster;
              }
              
              const container = document.createElement('div');
              container.className = 'img-container';
              img.parentNode.insertBefore(container, img);
              
              const btn = document.createElement('button');
              btn.className = 'btn-purge';
              btn.textContent = '영구 삭제/차단';
              btn.onclick = (e) => { e.preventDefault(); purgeImage(new URL(img.src).pathname); };
              
              container.appendChild(btn);
              container.appendChild(img);
            }
          });
        }, 100);
      }

      renderComments(data.comments || []);
      if (!skipPush) {
        history.pushState(null, '', `/view/${gallId}/${no}?page=${currentPage}&mode=${currentMode}&q=${encodeURIComponent(currentQuery)}`);
      }
    } catch (e) {
      console.error("Post load failed", e);
      postTitle.textContent = '불러오기 실패';
      postBody.textContent = '데이터를 불러오는 중 오류가 발생했습니다: ' + e.message;
    }
  }
    
    window.onpopstate = () => {
      const qs = new URLSearchParams(location.search);
      currentPage = Number(qs.get('page')) || 1;
      currentMode = qs.get('mode') || 'all';
      currentQuery = qs.get('q') || '';
      input.value = currentQuery;
      
      modeButtons.forEach((b) => b.classList.toggle('active', b.dataset.mode === currentMode));
      
      if (location.pathname.includes('/view/')) {
        const no = location.pathname.split('/').pop();
        openPost(no, currentPage, true);
      } else {
        showList();
        loadPage(currentPage, true);
      }
    };

    let searchTimer = null;
    const triggerSearch = () => {
      currentQuery = input.value.trim();
      clearTimeout(searchTimer);
      searchTimer = setTimeout(async () => {
        currentPage = 1;
        await loadPage(1);
      }, 250);
    };
    input.addEventListener('input', triggerSearch);
    searchModeSelect.addEventListener('change', triggerSearch);
    modeButtons.forEach((button) => button.addEventListener('click', async () => {
      modeButtons.forEach((b) => b.classList.remove('active'));
      button.classList.add('active');
      currentMode = button.dataset.mode;
      currentPage = 1;
      await loadPage(1);
    }));
    pagination.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-page]');
      if (!btn) return;
      await loadPage(Number(btn.dataset.page));
    });
    document.getElementById('backToList').addEventListener('click', (e) => {
      e.preventDefault();
      showList();
      // 만약 목록이 비어있다면(상세 페이지로 바로 진입한 경우 등) 목록을 불러옵니다.
      if (postList.children.length === 0) {
        loadPage(currentPage);
      } else {
        syncCount(rows.length);
        history.pushState(null, '', `/list/${gallId}?page=${currentPage}&mode=${currentMode}&q=${encodeURIComponent(currentQuery)}`);
      }
    });

    async function purgeImage(path) {
      if (!confirm("이 이미지를 서버에서 완전히 삭제하고 블랙리스트에 등록하시겠습니까?\n이 해시를 가진 모든 게시글의 이미지도 함께 삭제됩니다.")) return;
      
      try {
        const res = await fetch(`/api/purge-image?gall=${gallId}&path=${encodeURIComponent(path)}`);
        const data = await res.json();
        if (data.success) {
          alert(`성공적으로 삭제되었습니다. (삭제된 파일: ${data.deletedCount}개)`);
          // 현재 페이지 새로고침하여 삭제 결과 반영
          const no = location.pathname.split('/').pop();
          await openPost(no, currentPage, true);
        } else {
          alert("삭제 실패: " + data.error);
        }
      } catch (e) {
        alert("오류 발생: " + e.message);
      }
    }

    async function updateStorageStats() {
      try {
        const r = await fetch(`/api/stats?gall=${gallId}`);
        if (!r.ok) return;
        const data = await r.json();
        const s = data.storage;
        document.getElementById('storageStats').innerHTML = `
          📦 전체 용량: <strong>${s.total}</strong> | 
          📈 최근 24시간: <span style="color:var(--accent)">+${s.lastDay}</span> | 
          📅 한 달 예상: <strong>${s.estimatedMonth}</strong>
        `;
      } catch (e) {}
    }
    updateStorageStats();
    setInterval(updateStorageStats, 1000 * 60 * 10);
  </script>
